<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>Dicas de Carro – Zênite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bar:#1A0A00;--acc:#FF6600;--bg:#0A0A0A;
  --text:#EDF2FF;--muted:rgba(255,255,255,.5);--dim:rgba(255,255,255,.22);
  --card:rgba(255,255,255,.05);--brd:rgba(255,255,255,.09)
}
html{font-size:clamp(12px,1.5vw,22px)}
body{background:var(--bg);color:var(--text);font-family:"Helvetica Neue",Arial,sans-serif;
  width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;
  -webkit-text-size-adjust:100%}
.bar{height:7vh;min-height:44px;max-height:72px;background:var(--bar);
  display:flex;align-items:center;justify-content:space-between;padding:0 3vw;
  flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07);position:relative;z-index:10}
.brand{display:flex;align-items:center;gap:.6vw}
.brand-dot{width:.7vw;height:.7vw;min-width:6px;min-height:6px;border-radius:50%;background:var(--text);opacity:.85}
.brand-name{font-size:clamp(11px,1.1vw,18px);font-weight:800;letter-spacing:.35vw;color:var(--text);text-transform:uppercase}
.brand-sep{color:rgba(255,255,255,.2);margin:0 .3vw}
.brand-sub{font-size:clamp(8px,.8vw,13px);letter-spacing:.25vw;color:rgba(255,255,255,.45);text-transform:uppercase}
.bar-title{font-size:clamp(9px,.85vw,14px);letter-spacing:.3vw;color:rgba(255,255,255,.35);text-transform:uppercase}
.clock-box{display:flex;flex-direction:column;align-items:flex-end;gap:.2vh}
.clock{font-size:clamp(14px,1.5vw,24px);font-weight:800;letter-spacing:.2vw;color:var(--text);font-variant-numeric:tabular-nums}
.dstr{font-size:clamp(7px,.65vw,11px);letter-spacing:.2vw;color:rgba(255,255,255,.3);text-transform:uppercase}
.main{flex:1;overflow:hidden;display:flex;position:relative}
.bot{height:4.5vh;min-height:26px;max-height:50px;display:flex;align-items:center;
  justify-content:space-between;padding:0 3vw;border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0;position:relative;z-index:10}
.bot span{font-size:clamp(8px,.7vw,12px);letter-spacing:.15vw;color:rgba(255,255,255,.18);text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--brd);border-radius:clamp(6px,.8vw,14px);
  padding:clamp(10px,1.8vh,24px) clamp(12px,1.8vw,26px)}
.tag{font-size:clamp(8px,.7vw,12px);font-weight:800;letter-spacing:.3vw;color:var(--acc);text-transform:uppercase;margin-bottom:.4vh}
.ld{display:flex;align-items:center;justify-content:center;flex:1;
  font-size:clamp(11px,1.1vw,18px);letter-spacing:.2vw;color:rgba(255,255,255,.22);text-transform:uppercase}
.scene{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.scene svg{width:100%;height:100%}
.content{position:relative;z-index:2;flex:1;display:flex;overflow:hidden}

@media (orientation:portrait){
  .content{flex-direction:column!important}
  .side{width:100%!important;flex-direction:row;align-items:center;justify-content:center;
    gap:4vw;border-right:none!important;border-bottom:1px solid rgba(255,255,255,.08);
    padding:2vh 3vw!important;flex-shrink:0}
  .stag{font-size:clamp(9px,2.5vw,15px)!important;display:none}
  .snum{font-size:clamp(44px,12vw,80px)!important}
  .slbl{font-size:clamp(9px,2.5vw,14px)!important}
  .right{flex:1;padding:2vh 4vw!important;justify-content:center}
  .rcat{font-size:clamp(9px,2.5vw,14px)!important}
  .rtitle{font-size:clamp(20px,5.5vw,42px)!important}
  .rdetail{font-size:clamp(13px,3.5vw,22px)!important;max-width:100%!important}
}
</style>
</head>
<body>
<div class="bar">
  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">ZÊNITE</span>
    <span class="brand-sep">|</span>
    <span class="brand-sub">Anúncios</span>
  </div>
  <span class="bar-title">Dicas de Carro</span>
  <div class="clock-box">
    <span id="clock" class="clock">--:--</span>
    <span id="dstr" class="dstr"></span>
  </div>
</div>
<style>
.scene svg{width:100%;height:100%}
.content{flex-direction:row}
.side{width:28vw;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2vh 2vw;gap:1.5vh;text-align:center;border-right:1px solid rgba(255,255,255,.07)}
.stag{font-size:clamp(8px,.7vw,12px);font-weight:800;letter-spacing:.35vw;color:var(--acc);text-transform:uppercase}
.snum{font-size:clamp(42px,7vw,110px);font-weight:900;line-height:1;letter-spacing:-.3vw;color:var(--acc);word-break:break-all}
.slbl{font-size:clamp(8px,.8vw,13px);letter-spacing:.2vw;color:rgba(255,255,255,.3);text-transform:uppercase}
.right{flex:1;display:flex;flex-direction:column;justify-content:center;padding:3vh 3.5vw;gap:1.8vh}
.rcat{font-size:clamp(8px,.75vw,13px);font-weight:800;letter-spacing:.35vw;color:var(--acc);text-transform:uppercase}
.rtitle{font-size:clamp(22px,3.2vw,52px);font-weight:900;line-height:1.18;color:#fff}
.rdetail{font-size:clamp(13px,1.5vw,24px);color:rgba(255,255,255,.58);line-height:1.6;max-width:65vw}
.ralert{font-size:clamp(10px,1vw,16px);color:var(--acc);border:1px solid var(--acc);
  border-radius:.5vw;padding:.6vh 1.2vw;display:inline-block;opacity:.82;margin-top:.5vh}
.prow{display:flex;align-items:center;gap:1.2vw;margin-top:1vh}
.pwrap{flex:1;height:.45vh;min-height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.pbar{height:100%;background:#FF6600;border-radius:2px}
.pct{font-size:clamp(8px,.75vw,12px);letter-spacing:.2vw;color:rgba(255,255,255,.22);text-transform:uppercase;flex-shrink:0}

@media (orientation:portrait){
  .content{flex-direction:column!important}
  .side{width:100%!important;flex-direction:row;align-items:center;justify-content:center;
    gap:4vw;border-right:none!important;border-bottom:1px solid rgba(255,255,255,.08);
    padding:2vh 3vw!important;flex-shrink:0}
  .stag{font-size:clamp(9px,2.5vw,15px)!important;display:none}
  .snum{font-size:clamp(44px,12vw,80px)!important}
  .slbl{font-size:clamp(9px,2.5vw,14px)!important}
  .right{flex:1;padding:2vh 4vw!important;justify-content:center}
  .rcat{font-size:clamp(9px,2.5vw,14px)!important}
  .rtitle{font-size:clamp(20px,5.5vw,42px)!important}
  .rdetail{font-size:clamp(13px,3.5vw,22px)!important;max-width:100%!important}
}
</style>
<div class="scene"><svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
<defs><radialGradient id="hl" cx="50%" cy="80%" r="55%"><stop offset="0%" stop-color="#FF6600" stop-opacity=".14"/><stop offset="100%" stop-color="#FF3300" stop-opacity="0"/></radialGradient></defs>
<rect width="1920" height="1080" fill="#0A0A0A"/><rect width="1920" height="1080" fill="url(#hl)"/>
<g stroke="#FF6600" stroke-width="1" opacity=".09" fill="none">
  <line x1="960" y1="280" x2="0" y2="1080"/><line x1="960" y1="280" x2="1920" y2="1080"/>
  <line x1="960" y1="280" x2="300" y2="1080"/><line x1="960" y1="280" x2="1620" y2="1080"/>
  <line x1="960" y1="280" x2="600" y2="1080"/><line x1="960" y1="280" x2="1320" y2="1080"/>
</g>
<line x1="960" y1="280" x2="960" y2="1080" stroke="#FF6600" stroke-width="3" stroke-dasharray="40,30" opacity=".16"/>
<circle cx="960" cy="280" r="5" fill="#FF6600" opacity=".5"/>
<circle cx="960" cy="280" r="28" fill="#FF6600" opacity=".07"/>
</svg></div>
<div class="main">
  <div class="content">
    <div class="side">
      <div class="stag" id="stag">—</div>
      <div class="snum" id="snum">—</div>
      <div class="slbl" id="slbl">—</div>
    </div>
    <div class="right">
      <div class="rcat" id="rcat">—</div>
      <div class="rtitle" id="rtitle">—</div>
      <div class="rdetail" id="rdetail">—</div>
      <div id="ralert"></div>
      <div class="prow">
        <div class="pwrap"><div class="pbar" id="pbar"></div></div>
        <div class="pct" id="pct">1/10</div>
      </div>
    </div>
  </div>
</div>
<div class="bot"><span>Manutenção · Economia · Segurança</span><span id="upd">—</span></div>
<script>
var D=[
{cat:'Manutenção',num:'5.000',lbl:'km p/ troca de óleo',ttl:'Troque o óleo a cada 5.000 km',dtl:'Óleo velho perde viscosidade e aumenta o desgaste. Use sempre o óleo indicado no manual do fabricante.',alt:''},
{cat:'Economia',num:'3%',lbl:'de consumo a menos',ttl:'Calibre os pneus semanalmente',dtl:'Pneus na pressão correta reduzem o consumo em até 3% e aumentam a segurança nas curvas.',alt:''},
{cat:'Manutenção',num:'2–3',lbl:'anos de vida útil',ttl:'A bateria dura em média 2 a 3 anos',dtl:'Se o carro demora para pegar ou as luzes ficam fracas, faça uma revisão imediatamente.',alt:''},
{cat:'Economia',num:'20%',lbl:'de combustível',ttl:'Evite acelerar e frear bruscamente',dtl:'Direção suave economiza até 20% de combustível. Antecipe semáforos e mantenha distância segura.',alt:''},
{cat:'Segurança',num:'2×',lbl:'mais caro sem troca',ttl:'Pastilhas de freio pedem atenção',dtl:'Rangido ao frear indica desgaste. Troque antes de danificar o disco — o reparo sai muito mais caro.',alt:''},
{cat:'Economia',num:'10%',lbl:'a menos de consumo',ttl:'Filtro de ar limpo economiza combustível',dtl:'Filtro entupido aumenta o consumo em até 10%. Troque a cada 15.000 km — simples e barato.',alt:''},
{cat:'Segurança',num:'1×/ano',lbl:'troca mínima',ttl:'Troque os limpadores de para-brisa anualmente',dtl:'Borrachas ressecadas reduzem visibilidade na chuva de forma perigosa. Troca rápida e barata.',alt:''},
{cat:'Manutenção',num:'10k',lbl:'km para revisar',ttl:'Balanceamento e alinhamento a cada 10.000 km',dtl:'Rodas desalinhadas causam desgaste irregular e aumentam o consumo. Sentirá a diferença.',alt:''},
{cat:'Economia',num:'15%',lbl:'a mais de consumo',ttl:'Use o ar-condicionado com inteligência',dtl:'Ligue o AC alguns minutos após sair. Em baixas velocidades, prefira ventilar com janelas abertas.',alt:''},
{cat:'Manutenção',num:'6',lbl:'meses entre revisões',ttl:'Verifique o fluido do radiador regularmente',dtl:'Superaquecimento causa danos graves ao motor. Cheque o nível e qualidade do arrefecimento.',alt:''},
];
var idx=Math.floor(Math.random()*D.length),p=0,DUR=10;
function show(){
  var d=D[idx%D.length];
  document.getElementById('stag').textContent=d.cat;
  document.getElementById('snum').textContent=d.num;
  document.getElementById('slbl').textContent=d.lbl;
  document.getElementById('rcat').textContent=d.cat;
  document.getElementById('rtitle').textContent=d.ttl;
  document.getElementById('rdetail').textContent=d.dtl;
  var al=document.getElementById('ralert');
  if(d.alt){al.className='ralert';al.textContent=d.alt}else{al.className='';al.textContent=''}
  document.getElementById('pct').textContent=(idx%D.length+1)+'/'+D.length;
  document.getElementById('upd').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  p=0;
}
function tick(){p+=100/(DUR*10);if(p>=100){idx++;show()}document.getElementById('pbar').style.width=Math.min(p,100)+'%'}

(function tick(){
  var n=new Date();
  var c=document.getElementById('clock');
  var d=document.getElementById('dstr');
  if(c)c.textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(d)d.textContent=n.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}).replace('.','·').toUpperCase();
  setTimeout(tick,1000);
})();

show();setInterval(tick,100);
</script></body></html>
