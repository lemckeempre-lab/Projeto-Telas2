<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>Esportes — Resultados & Notícias – Zênite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bar:#031403;--acc:#28A03C;--bg:#060E06;
  --text:#EDF2FF;--muted:rgba(255,255,255,.5);--dim:rgba(255,255,255,.22);
  --card:rgba(5,18,5,.72);--brd:rgba(40,160,60,.18)
}
html{font-size:clamp(12px,1.5vw,22px)}
body{background:var(--bg);color:var(--text);font-family:"Helvetica Neue",Arial,sans-serif;
  width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;
  -webkit-text-size-adjust:100%}
.bar{height:7vh;min-height:44px;max-height:72px;background:var(--bar);
  display:flex;align-items:center;justify-content:space-between;padding:0 3vw;
  flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07);position:relative;z-index:10}
.brand{display:flex;align-items:center;gap:.6vw}
.brand-dot{width:.7vw;height:.7vw;min-width:6px;min-height:6px;border-radius:50%;background:var(--text);opacity:.85}
.brand-name{font-size:clamp(11px,1.1vw,18px);font-weight:800;letter-spacing:.35vw;color:var(--text);text-transform:uppercase}
.brand-sep{color:rgba(255,255,255,.2);margin:0 .3vw}
.brand-sub{font-size:clamp(8px,.8vw,13px);letter-spacing:.25vw;color:rgba(255,255,255,.45);text-transform:uppercase}
.bar-title{font-size:clamp(9px,.85vw,14px);letter-spacing:.3vw;color:rgba(255,255,255,.35);text-transform:uppercase}
.clock-box{display:flex;flex-direction:column;align-items:flex-end;gap:.2vh}
.clock{font-size:clamp(14px,1.5vw,24px);font-weight:800;letter-spacing:.2vw;color:var(--text);font-variant-numeric:tabular-nums}
.dstr{font-size:clamp(7px,.65vw,11px);letter-spacing:.2vw;color:rgba(255,255,255,.3);text-transform:uppercase}
.main{flex:1;overflow:hidden;display:flex;position:relative}
.bot{height:4.5vh;min-height:26px;max-height:50px;display:flex;align-items:center;
  justify-content:space-between;padding:0 3vw;border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0;position:relative;z-index:10}
.bot span{font-size:clamp(8px,.7vw,12px);letter-spacing:.15vw;color:rgba(255,255,255,.18);text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--brd);border-radius:clamp(6px,.8vw,14px);
  padding:clamp(10px,1.8vh,24px) clamp(12px,1.8vw,26px)}
.tag{font-size:clamp(8px,.7vw,12px);font-weight:800;letter-spacing:.3vw;color:var(--acc);text-transform:uppercase;margin-bottom:.4vh}
.ld{display:flex;align-items:center;justify-content:center;flex:1;
  font-size:clamp(11px,1.1vw,18px);letter-spacing:.2vw;color:rgba(255,255,255,.22);text-transform:uppercase}
.scene{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.scene svg{width:100%;height:100%}
.content{position:relative;z-index:2;flex:1;display:flex;overflow:hidden}

@media (orientation:portrait){
  .content{flex-direction:column!important;padding:1.5vh 3vw}
  .left,.right{flex:unset!important;width:100%}
  .left{flex:1.4!important}
  .right{flex:1!important}
  .ec{flex:0 0 auto!important;max-height:none!important;
    height:calc((100vh - 7vh - 4.5vh - 4vh) / 5.2);min-height:0}
  .ec.top .ettl{font-size:clamp(13px,2.8vw,20px)!important}
  .ettl{font-size:clamp(12px,2.5vw,18px)!important}
  .esrc{font-size:clamp(9px,1.8vw,14px)!important}
  .tbox{max-height:32vh;overflow:hidden}
  table td,table th{padding:clamp(3px,1vw,8px) clamp(4px,1.2vw,10px)!important;font-size:clamp(10px,2.2vw,15px)!important}
}
</style>
</head>
<body>
<div class="bar">
  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">ZÊNITE</span>
    <span class="brand-sep">|</span>
    <span class="brand-sub">Anúncios</span>
  </div>
  <span class="bar-title">Esportes — Resultados & Notícias</span>
  <div class="clock-box">
    <span id="clock" class="clock">--:--</span>
    <span id="dstr" class="dstr"></span>
  </div>
</div>
<style>
.content{flex-direction:row;padding:2vh 3vw 1.5vh;gap:2vw}
.left{flex:1.4;display:flex;flex-direction:column;gap:1.2vh}
.right{flex:.75;display:flex;flex-direction:column;gap:.8vh}
.ch{font-size:clamp(8px,.7vw,12px);font-weight:800;letter-spacing:.3vw;color:rgba(160,255,160,.35);text-transform:uppercase;margin-bottom:.4vh}
.ec{background:rgba(5,18,5,.72);border:1px solid rgba(40,160,60,.18);border-radius:clamp(6px,.8vw,14px);
  padding:clamp(8px,1.5vh,20px) clamp(10px,1.5vw,20px);flex:1;min-height:0;max-height:28vh;display:flex;flex-direction:column;gap:.5vh;overflow:hidden}
.ec.top{border-left:clamp(2px,.25vw,4px) solid #28A03C;border-radius:clamp(6px,.8vw,14px)}
.esrc{font-size:clamp(8px,.7vw,12px);font-weight:800;letter-spacing:.25vw;color:#28A03C;text-transform:uppercase}
.ettl{font-size:clamp(12px,1.4vw,22px);font-weight:700;line-height:1.25;color:#F0FFF0}
.ec.top .ettl{font-size:clamp(14px,1.7vw,26px)}
.eago{font-size:clamp(8px,.75vw,13px);color:rgba(150,255,150,.28);margin-top:auto}
.tbox{background:rgba(5,18,5,.72);border:1px solid rgba(40,160,60,.18);border-radius:clamp(6px,.8vw,14px);overflow:hidden;flex:1}
.th{padding:clamp(6px,1vh,14px) clamp(8px,1vw,16px);font-size:clamp(8px,.7vw,12px);letter-spacing:.25vw;color:rgba(160,255,160,.35);text-transform:uppercase;border-bottom:1px solid rgba(40,160,60,.12)}
table{width:100%;border-collapse:collapse}
th{font-size:clamp(7px,.65vw,11px);letter-spacing:.15vw;color:rgba(160,255,160,.3);text-transform:uppercase;padding:clamp(5px,.9vh,12px) clamp(6px,.9vw,12px);text-align:center}
th:first-child{text-align:left}
td{padding:clamp(5px,.9vh,11px) clamp(6px,.9vw,12px);border-bottom:1px solid rgba(40,160,60,.08);text-align:center;color:rgba(200,255,200,.65);font-size:clamp(10px,1.1vw,17px)}
td:first-child{text-align:left;font-weight:700;color:#F0FFF0}
td.pos{color:rgba(160,255,160,.32);font-weight:400;font-size:clamp(9px,.9vw,14px)}
tr:last-child td{border:none}

@media (orientation:portrait){
  .content{flex-direction:column!important;padding:1.5vh 3vw}
  .left,.right{flex:unset!important;width:100%}
  .left{flex:1.4!important}
  .right{flex:1!important}
  .ec{flex:0 0 auto!important;max-height:none!important;
    height:calc((100vh - 7vh - 4.5vh - 4vh) / 5.2);min-height:0}
  .ec.top .ettl{font-size:clamp(13px,2.8vw,20px)!important}
  .ettl{font-size:clamp(12px,2.5vw,18px)!important}
  .esrc{font-size:clamp(9px,1.8vw,14px)!important}
  .tbox{max-height:32vh;overflow:hidden}
  table td,table th{padding:clamp(3px,1vw,8px) clamp(4px,1.2vw,10px)!important;font-size:clamp(10px,2.2vw,15px)!important}
}
</style>
<div class="scene"><svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
<defs>
  <radialGradient id="sp1" cx="25%" cy="0%" r="42%"><stop offset="0%" stop-color="#28A03C" stop-opacity=".18"/><stop offset="100%" stop-color="#28A03C" stop-opacity="0"/></radialGradient>
  <radialGradient id="sp2" cx="75%" cy="0%" r="42%"><stop offset="0%" stop-color="#28A03C" stop-opacity=".18"/><stop offset="100%" stop-color="#28A03C" stop-opacity="0"/></radialGradient>
</defs>
<rect width="1920" height="1080" fill="#060E06"/>
<rect width="1920" height="1080" fill="url(#sp1)"/><rect width="1920" height="1080" fill="url(#sp2)"/>
<g stroke="#28A03C" stroke-width="1.5" fill="none" opacity=".15">
  <rect x="240" y="720" width="1440" height="340"/>
  <line x1="960" y1="720" x2="960" y2="1060"/>
  <circle cx="960" cy="890" r="85"/>
</g>
</svg></div>
<div class="main">
  <div class="content" id="main-wrap"><div class="ld">Carregando...</div></div>
</div>
<div class="bot"><span>Globo Esporte · R7 · Atualiza a cada 20 min</span><span id="upd">—</span></div>
<script>
var FEEDS=[
  {url:'https://globoesporte.globo.com/futebol/rss2.0.xml',name:'Globo Esporte'},
  {url:'https://esportes.r7.com/feed/',name:'R7 Esportes'}
];
var API='https://api.rss2json.com/v1/api.json?rss_url=';
var TAB=[{p:1,t:'Botafogo',pts:36,pg:18},{p:2,t:'Flamengo',pts:34,pg:18},{p:3,t:'Palmeiras',pts:31,pg:18},{p:4,t:'Fortaleza',pts:30,pg:18},{p:5,t:'Cruzeiro',pts:28,pg:18},{p:6,t:'Bahia',pts:27,pg:18},{p:7,t:'São Paulo',pts:26,pg:18}];
function strip(h){return(h||'').replace(/<[^>]*>/g,'').replace(/&[a-z#0-9]+;/g,' ').trim()}
function ago(d){var m=(Date.now()-new Date(d))/60000;if(m<60)return'há '+Math.round(m)+' min';if(m<1440)return'há '+Math.round(m/60)+'h';return'ontem';}
async function load(){
  var items=[];
  for(var i=0;i<FEEDS.length;i++){
    try{var r=await fetch(API+encodeURIComponent(FEEDS[i].url)+'&count=5');var d=await r.json();
    if(d.status==='ok')d.items.slice(0,4).forEach(function(it){items.push(Object.assign({},it,{source:FEEDS[i].name}))});}catch(e){}
    if(items.length>=5)break;
  }
  items.sort(function(a,b){return new Date(b.pubDate)-new Date(a.pubDate)});
  var top=items.slice(0,5);
  if(!top.length){top=[
    {title:'Brasileirão 2025 tem início marcado para abril com novidades no formato',source:'Globo Esporte',pubDate:new Date().toISOString()},
    {title:'Chapecoense se prepara para temporada na Série B com reforços contratados',source:'Globo Esporte',pubDate:new Date(Date.now()-3600000).toISOString()},
    {title:'Figueirense estreia no Campeonato Catarinense com vitória em casa',source:'R7 Esportes',pubDate:new Date(Date.now()-7200000).toISOString()},
    {title:'Brusque FC anuncia novo técnico para disputa da temporada 2025',source:'R7 Esportes',pubDate:new Date(Date.now()-10800000).toISOString()},
    {title:'Vale do Itajaí se destaca no futebol de base com revelações para clubes do Sul',source:'Globo Esporte',pubDate:new Date(Date.now()-14400000).toISOString()},
  ];}
  var lh='<div class="ch">Últimas notícias</div>';
  top.forEach(function(it,i){
    lh+='<div class="ec'+(i===0?' top':'')+'"><span class="esrc">'+it.source+'</span>'
      +'<span class="ettl">'+strip(it.title).substring(0,90)+'</span>'
      +'<span class="eago">'+ago(it.pubDate)+'</span></div>';
  });
  var rh='<div class="ch">Brasileirão Série A</div>'
    +'<div class="tbox"><div class="th">Classificação</div>'
    +'<table><tr><th></th><th style="text-align:left">Time</th><th>PG</th><th>PTS</th></tr>';
  TAB.forEach(function(row){rh+='<tr><td class="pos">'+row.p+'</td><td>'+row.t+'</td><td>'+row.pg+'</td><td><strong>'+row.pts+'</strong></td></tr>';});
  rh+='</table></div>';
  document.getElementById('main-wrap').innerHTML='<div class="left">'+lh+'</div><div class="right">'+rh+'</div>';
  document.getElementById('upd').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

(function tick(){
  var n=new Date();
  var c=document.getElementById('clock');
  var d=document.getElementById('dstr');
  if(c)c.textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(d)d.textContent=n.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}).replace('.','·').toUpperCase();
  setTimeout(tick,1000);
})();

load();setInterval(load,20*60*1000);setTimeout(function(){location.reload()},4*60*60*1000);
</script></body></html>
