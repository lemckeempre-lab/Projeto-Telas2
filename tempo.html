<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>Previsão do Tempo — Blumenau – Zênite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bar:#0F1E44;--acc:#4A9EFF;--bg:#070E1C;
  --text:#EDF2FF;--muted:rgba(255,255,255,.5);--dim:rgba(255,255,255,.22);
  --card:rgba(12,25,55,.65);--brd:rgba(80,140,255,.14)
}
html{font-size:clamp(12px,1.5vw,22px)}
body{background:var(--bg);color:var(--text);font-family:"Helvetica Neue",Arial,sans-serif;
  width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;
  -webkit-text-size-adjust:100%}
.bar{height:7vh;min-height:44px;max-height:72px;background:var(--bar);
  display:flex;align-items:center;justify-content:space-between;padding:0 3vw;
  flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07);position:relative;z-index:10}
.brand{display:flex;align-items:center;gap:.6vw}
.brand-dot{width:.7vw;height:.7vw;min-width:6px;min-height:6px;border-radius:50%;background:var(--text);opacity:.85}
.brand-name{font-size:clamp(11px,1.1vw,18px);font-weight:800;letter-spacing:.35vw;color:var(--text);text-transform:uppercase}
.brand-sep{color:rgba(255,255,255,.2);margin:0 .3vw}
.brand-sub{font-size:clamp(8px,.8vw,13px);letter-spacing:.25vw;color:rgba(255,255,255,.45);text-transform:uppercase}
.bar-title{font-size:clamp(9px,.85vw,14px);letter-spacing:.3vw;color:rgba(255,255,255,.35);text-transform:uppercase}
.clock-box{display:flex;flex-direction:column;align-items:flex-end;gap:.2vh}
.clock{font-size:clamp(14px,1.5vw,24px);font-weight:800;letter-spacing:.2vw;color:var(--text);font-variant-numeric:tabular-nums}
.dstr{font-size:clamp(7px,.65vw,11px);letter-spacing:.2vw;color:rgba(255,255,255,.3);text-transform:uppercase}
.main{flex:1;overflow:hidden;display:flex;position:relative}
.bot{height:4.5vh;min-height:26px;max-height:50px;display:flex;align-items:center;
  justify-content:space-between;padding:0 3vw;border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0;position:relative;z-index:10}
.bot span{font-size:clamp(8px,.7vw,12px);letter-spacing:.15vw;color:rgba(255,255,255,.18);text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--brd);border-radius:clamp(6px,.8vw,14px);
  padding:clamp(10px,1.8vh,24px) clamp(12px,1.8vw,26px)}
.tag{font-size:clamp(8px,.7vw,12px);font-weight:800;letter-spacing:.3vw;color:var(--acc);text-transform:uppercase;margin-bottom:.4vh}
.ld{display:flex;align-items:center;justify-content:center;flex:1;
  font-size:clamp(11px,1.1vw,18px);letter-spacing:.2vw;color:rgba(255,255,255,.22);text-transform:uppercase}
.scene{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.scene svg{width:100%;height:100%}
.content{position:relative;z-index:2;flex:1;display:flex;overflow:hidden}

@media (orientation:portrait){
  .content{flex-direction:column!important;gap:2vh}
  .now{width:100%!important;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:1.5vw;padding-bottom:2vh;border-bottom:1px solid rgba(80,140,255,.12)}
  .now .city{width:100%;text-align:center;font-size:clamp(10px,2vw,16px)}
  .now .w-icon{font-size:clamp(48px,12vw,80px)!important}
  .now .temp{font-size:clamp(52px,14vw,90px)!important;letter-spacing:-.3vw}
  .now .temp sup{font-size:clamp(20px,5vw,36px)!important}
  .now .wdesc{width:100%;text-align:center;font-size:clamp(14px,3vw,22px)!important}
  .now .feels{width:100%;text-align:center;font-size:clamp(11px,2.5vw,17px)!important}
  .fcol{justify-content:flex-start;gap:1.5vw}
  .fcrow{flex:0 0 auto!important;max-height:none!important;height:calc((100vh - 20vh - 7vh - 4.5vh) / 3.5)}
  .fday{font-size:clamp(14px,3.5vw,22px)!important;min-width:18vw!important}
  .fic{font-size:clamp(28px,6vw,44px)!important;margin-right:2.5vw!important}
  .fdesc{font-size:clamp(13px,2.8vw,20px)!important}
  .ftmp{font-size:clamp(16px,3.5vw,24px)!important}
  .ftmp span{font-size:clamp(12px,2.5vw,17px)!important}
  .frain{font-size:clamp(11px,2.5vw,16px)!important}
}
</style>
</head>
<body>
<div class="bar">
  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">ZÊNITE</span>
    <span class="brand-sep">|</span>
    <span class="brand-sub">Anúncios</span>
  </div>
  <span class="bar-title">Previsão do Tempo — Blumenau</span>
  <div class="clock-box">
    <span id="clock" class="clock">--:--</span>
    <span id="dstr" class="dstr"></span>
  </div>
</div>
<style>
.scene svg{width:100%;height:100%}
.content{flex-direction:row;padding:2.5vh 3vw 1.5vh;gap:2.5vw}
.now{width:28vw;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2vh;text-align:center}
.now .city{font-size:clamp(8px,.75vw,13px);letter-spacing:.4vw;color:rgba(200,225,255,.55);text-transform:uppercase;font-weight:600}
.now .w-icon{font-size:clamp(60px,9vw,120px);line-height:1;margin:.5vh 0;filter:drop-shadow(0 0 2vw rgba(80,160,255,.35))}
.now .temp{font-size:clamp(60px,9.5vw,130px);font-weight:900;line-height:1;letter-spacing:-.4vw;color:#fff}
.now .temp sup{font-size:clamp(24px,3.5vw,48px);font-weight:300;opacity:.4;vertical-align:super}
.now .wdesc{font-size:clamp(13px,1.4vw,22px);color:rgba(200,225,255,.7);font-weight:500}
.now .feels{font-size:clamp(9px,.9vw,15px);color:rgba(200,225,255,.38)}
.dets{display:flex;gap:2.5vw;margin-top:1.2vh}
.det .v{font-size:clamp(11px,1.2vw,18px);font-weight:700;color:#4A9EFF}
.det .l{font-size:clamp(7px,.65vw,11px);letter-spacing:.2vw;color:rgba(200,225,255,.38);text-transform:uppercase;margin-top:.3vh}
.fcol{flex:1;display:flex;flex-direction:column;gap:1.2vh;justify-content:center}
.fclbl{font-size:clamp(8px,.7vw,12px);letter-spacing:.3vw;color:rgba(200,225,255,.3);text-transform:uppercase;margin-bottom:.4vh}
.fcrow{background:rgba(12,25,55,.65);border:1px solid rgba(80,140,255,.14);border-radius:clamp(6px,.8vw,14px);
  padding:clamp(10px,1.8vh,20px) clamp(12px,1.8vw,24px);display:flex;align-items:center;
  flex:1;min-height:0;max-height:30vh}
.fday{font-size:clamp(11px,1.3vw,20px);font-weight:700;min-width:9vw;color:#EDF2FF}
.fic{font-size:clamp(22px,2.8vw,42px);margin-right:1.5vw;flex-shrink:0}
.fdesc{font-size:clamp(10px,1.1vw,17px);color:rgba(200,225,255,.6);flex:1}
.ftmp{font-size:clamp(13px,1.5vw,22px);font-weight:800;color:#EDF2FF;white-space:nowrap}
.ftmp span{font-size:clamp(10px,1.1vw,16px);font-weight:400;color:rgba(200,225,255,.4);margin-left:.8vw}
.frain{font-size:clamp(9px,.9vw,14px);color:#4A9EFF;margin-left:1vw;flex-shrink:0}

@media (orientation:portrait){
  .content{flex-direction:column!important;gap:2vh}
  .now{width:100%!important;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:1.5vw;padding-bottom:2vh;border-bottom:1px solid rgba(80,140,255,.12)}
  .now .city{width:100%;text-align:center;font-size:clamp(10px,2vw,16px)}
  .now .w-icon{font-size:clamp(48px,12vw,80px)!important}
  .now .temp{font-size:clamp(52px,14vw,90px)!important;letter-spacing:-.3vw}
  .now .temp sup{font-size:clamp(20px,5vw,36px)!important}
  .now .wdesc{width:100%;text-align:center;font-size:clamp(14px,3vw,22px)!important}
  .now .feels{width:100%;text-align:center;font-size:clamp(11px,2.5vw,17px)!important}
  .fcol{justify-content:flex-start;gap:1.5vw}
  .fcrow{flex:0 0 auto!important;max-height:none!important;height:calc((100vh - 20vh - 7vh - 4.5vh) / 3.5)}
  .fday{font-size:clamp(14px,3.5vw,22px)!important;min-width:18vw!important}
  .fic{font-size:clamp(28px,6vw,44px)!important;margin-right:2.5vw!important}
  .fdesc{font-size:clamp(13px,2.8vw,20px)!important}
  .ftmp{font-size:clamp(16px,3.5vw,24px)!important}
  .ftmp span{font-size:clamp(12px,2.5vw,17px)!important}
  .frain{font-size:clamp(11px,2.5vw,16px)!important}
}
</style>
<div class="scene"><svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#060E1E"/><stop offset="55%" stop-color="#0A1E50"/><stop offset="100%" stop-color="#1A3878"/></linearGradient>
  <radialGradient id="glo" cx="50%" cy="100%" r="55%"><stop offset="0%" stop-color="#FF9030" stop-opacity=".28"/><stop offset="100%" stop-color="#FF5010" stop-opacity="0"/></radialGradient>
</defs>
<rect width="1920" height="1080" fill="url(#sky)"/>
<rect width="1920" height="1080" fill="url(#glo)"/>
<g fill="#fff" opacity=".5"><circle cx="140" cy="90" r="1.5"/><circle cx="380" cy="55" r="1"/><circle cx="680" cy="88" r="1.5"/><circle cx="980" cy="48" r="1"/><circle cx="1280" cy="76" r="1.5"/><circle cx="1580" cy="38" r="1"/><circle cx="1800" cy="105" r="1.5"/></g>
</svg></div>
<div class="main">
  <div class="content" id="content"><div class="ld">Carregando previsão...</div></div>
</div>
<div class="bot"><span>wttr.in · Blumenau SC · Atualiza a cada 10 min</span><span id="upd">—</span></div>
<script>
var IC={113:'☀️',116:'⛅',119:'🌥️',122:'☁️',143:'🌫️',176:'🌦️',200:'⛈️',263:'🌦️',293:'🌦️',296:'🌧️',302:'🌧️',305:'🌧️',353:'🌦️',356:'🌧️',386:'⛈️',227:'❄️'};
var DY=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function gi(c){return IC[parseInt(c)]||'🌡️'}
async function load(){
  try{
    var r=await fetch('https://wttr.in/Blumenau+SC?format=j1');
    var d=await r.json();
    var c=d.current_condition[0];
    var tmp=parseInt(c.temp_C),fl=parseInt(c.FeelsLikeC),hum=c.humidity,wnd=c.windspeedKmph;
    var code=parseInt(c.weatherCode);
    var desc=(c.weatherDesc&&c.weatherDesc[0]&&c.weatherDesc[0].value)||'Variável';
    var lb=["Hoje","Amanhã",""];
    var fc='';
    var hoje=new Date();d.weather.forEach(function(w,i){
      var dt=new Date(hoje);dt.setDate(hoje.getDate()+i);
      var nm=i<2?lb[i]:DY[dt.getDay()];
      var mx=parseInt(w.maxtempC),mn=parseInt(w.mintempC);
      var h4=w.hourly[4]||{};
      var rain=parseInt(h4.chanceofrain||0);
      var dc=parseInt(h4.weatherCode||113);
      var dd=(h4.weatherDesc&&h4.weatherDesc[0]&&h4.weatherDesc[0].value)||'Variável';
      fc+='<div class="fcrow"><span class="fday">'+nm+'</span>'
        +'<span class="fic">'+gi(dc)+'</span>'
        +'<span class="fdesc">'+dd+'</span>'
        +'<span class="ftmp">'+mx+'°<span>'+mn+'°</span></span>'
        +'<span class="frain">💧'+rain+'%</span></div>';
    });
    document.getElementById('content').innerHTML=
      '<div class="now">'
        +'<div class="city">Blumenau · SC</div>'
        +'<div class="w-icon">'+gi(code)+'</div>'
        +'<div class="temp">'+tmp+'<sup>°C</sup></div>'
        +'<div class="wdesc">'+desc+'</div>'
        +'<div class="feels">Sensação '+fl+'°C</div>'
        +'<div class="dets">'
          +'<div class="det"><div class="v">💧'+hum+'%</div><div class="l">Umidade</div></div>'
          +'<div class="det"><div class="v">💨'+wnd+'</div><div class="l">km/h</div></div>'
        +'</div>'
      +'</div>'
      +'<div class="fcol"><div class="fclbl">Próximos dias</div>'+fc+'</div>';
    document.getElementById('upd').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){document.getElementById('content').innerHTML='<div class="ld">Sem conexão</div>'}
}

(function tick(){
  var n=new Date();
  var c=document.getElementById('clock');
  var d=document.getElementById('dstr');
  if(c)c.textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(d)d.textContent=n.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}).replace('.','·').toUpperCase();
  setTimeout(tick,1000);
})();

load();setInterval(load,10*60*1000);setTimeout(function(){location.reload()},4*60*60*1000);
</script></body></html>
